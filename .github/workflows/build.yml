name: Build ASCII Player
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Install Dependencies
        run: |
          pip install opencv-python pygame pyinstaller
      - name: Build EXE
        run: pyinstaller --onefile --clean ascii_player.py
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/ascii_player.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-mixer-2.0-0
          pip install opencv-python-headless pygame pyinstaller
      - name: Build Binary
        run: pyinstaller --onefile --clean ascii_player.py
      - name: Create ISO (Minimal)
        run: |
          sudo apt-get install -y xorriso isolinux syslinux-common
          mkdir -p iso_root/boot/isolinux
          cp dist/ascii_player iso_root/ascii_player
          echo "Run /ascii_player" > iso_root/run.sh
          genisoimage -o player.iso -R -J iso_root/
      - name: Upload Linux & ISO
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist/ascii_player
            player.iso
