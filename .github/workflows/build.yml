name: Build Bad Apple Everywhere
on: [push]

jobs:
  build-linux-iso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.9' }

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full cpio gzip genisoimage wget
          pip install opencv-python-headless pygame pyinstaller

      - name: Build Standalone Binary
        run: |
          ADD_DATA=""
          for f in *.mp4 *.mid; do
            [ -e "$f" ] && ADD_DATA="$ADD_DATA --add-data $f:."
          done
          pyinstaller --onefile --clean $ADD_DATA ascii_player.py

      - name: Create Bootable ISO (TinyCore Based)
        run: |
          mkdir tc_build && cd tc_build
          # Скачиваем официальный минимальный образ TinyCore (16 MB)
          wget http://tinycorelinux.net/14.x/x86_64/release/CorePure64-14.0.iso
          
          # Распаковываем ISO
          7z x CorePure64-14.0.iso -oiso_root
          
          # Распаковываем файловую систему (initramfs)
          mkdir rootfs && cd rootfs
          zcat ../iso_root/boot/corepure64.gz | sudo cpio -i -H newc -d
          
          # Копируем наш скомпилированный плеер в системную папку
          sudo cp ../../dist/ascii_player usr/local/bin/
          
          # Добавляем скрипт в автозагрузку
          sudo sh -c 'echo "clear" >> opt/bootlocal.sh'
          sudo sh -c 'echo "/usr/local/bin/ascii_player" >> opt/bootlocal.sh'
          
          # Запаковываем файловую систему обратно
          sudo find | sudo cpio -o -H newc | gzip -2 > ../iso_root/boot/corepure64.gz
          cd ..
          
          # Собираем финальный загрузочный ISO-образ
          genisoimage -l -J -R -V BAD_APPLE -no-emul-boot -boot-load-size 4 -boot-info-table -b boot/isolinux/isolinux.bin -c boot/isolinux/boot.cat -o ../bad_apple.iso iso_root

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-and-iso
          path: |
            dist/ascii_player
            bad_apple.iso

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Build EXE
        run: |
          pip install opencv-python-headless pygame pyinstaller
          $files = Get-ChildItem -File | Where-Object { $_.Extension -match "\.(mp4|mid)$" }
          $add_data = ""
          foreach ($f in $files) { $add_data += " --add-data ""$($f.Name);.""" }
          Invoke-Expression "pyinstaller --onefile --clean $add_data ascii_player.py"
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/ascii_player.exe