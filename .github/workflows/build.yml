name: Build ASCII Player
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Install UPX
        run: choco install upx
      - name: Install Dependencies
        run: |
          pip install opencv-python-headless pygame pyinstaller
      - name: Build EXE with embedded media
        run: |
          $files = Get-ChildItem -File | Where-Object { $_.Extension -match "\.(mp4|mid)$" }
          $add_data = ""
          foreach ($f in $files) { $add_data += " --add-data ""$($f.Name);.""" }
          Invoke-Expression "pyinstaller --onefile --clean $add_data ascii_player.py"
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/ascii_player.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-mixer-2.0-0 xorriso isolinux syslinux-common genisoimage upx-ucl
          pip install opencv-python-headless pygame pyinstaller
      - name: Build Binary with embedded media
        run: |
          ADD_DATA=""
          for f in *.mp4 *.mid; do
            if [ -e "$f" ]; then
              ADD_DATA="$ADD_DATA --add-data $f:."
            fi
          done
          pyinstaller --onefile --clean $ADD_DATA ascii_player.py
      - name: Create ISO (Minimal)
        run: |
          mkdir -p iso_root/boot/isolinux
          cp dist/ascii_player iso_root/ascii_player
          echo "Run /ascii_player" > iso_root/run.sh
          genisoimage -o player.iso -R -J iso_root/
      
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/ascii_player
          
      - name: Upload ISO Image
        uses: actions/upload-artifact@v4
        with:
          name: iso-dist
          path: player.iso